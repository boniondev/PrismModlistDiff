<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="index.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Modlist Diff Tool</title>
</head>
<body>
    <div id="JSWarning">Javascript is required for this tool to work.</div>
    <div id="appWrapper">
        <div id="modListCheckBoxWrapper">
            <input type="checkbox" id="modlistCheckCheckbox">
            <label for="modlistCheckCheckbox" id="modlistCheckLabel">Check modlists for duplicate mods</label>
        </div>
        <div id="inputTextWrapper">
            <textarea id="inputText" placeholder="Paste the target modlist here..."></textarea>
        </div>
    </div>
</body>
</html>
